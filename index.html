<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Typing Master 🎉</title>
    <style>
        /* --- デザインリニューアル: パステル & ポップ --- */
        :root {
            --bg-color: #e3f2fd; /* 明るいパステルブルー */
            --card-bg: #ffffff;
            --primary-color: #ff9800; /* 元気なオレンジ */
            --primary-hover: #f57c00;
            --perfect-color: #4caf50; /* 安心感のある緑 */
            --clear-color: #8bc34a;   /* 黄緑 */
            --error-color: #ef5350;   /* パステルレッド */
            --text-main: #333333;     /* 濃いグレー（目に優しい） */
            --text-light: #b0bec5;
            
            /* 黒板風タイピングエリア */
            --chalkboard-bg: #2a4d3e;
            --chalk-white: #ffffff;

            /* 指の色分け（パステルカラーに変更） */
            --pinky: #ffcdd2; --ring: #fff9c4; --middle: #c8e6c9; --index: #bbdefb;
            --key-shadow: #b0bec5;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(120deg, #e3f2fd 0%, #ffffff 100%); /* 爽やかなグラデーション */
        }

        #app {
            width: 95%;
            max-width: 980px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 25px; /* 角を丸く */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); /* 立体感 */
            text-align: center;
            border: 5px solid #fff; /* 白いフレーム */
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-top: 0;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        .hidden { display: none !important; }

        /* --- トップ画面 UI --- */
        .menu-section {
            border: 2px solid #e1f5fe;
            background-color: #fbfdff;
            border-radius: 15px;
            margin-bottom: 25px;
            padding: 20px;
        }
        
        .row { margin-bottom: 15px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 10px;}
        
        /* ラジオボタンを可愛く */
        .source-selector label {
            background: #fff;
            border: 2px solid #ddd;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            font-weight: bold;
        }
        .source-selector input[type="radio"] { margin-right: 8px; transform: scale(1.2); }
        .source-selector input[type="radio"]:checked + span { color: var(--primary-color); }
        .source-selector label:has(input:checked) {
            border-color: var(--primary-color);
            background-color: #fff3e0;
            box-shadow: 0 4px 0 #ffe0b2;
        }

        #standard-file-select, #category-select {
            width: 380px; max-width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border-radius: 10px;
            border: 2px solid #ddd;
            background-color: #fff;
            color: var(--text-main);
            cursor: pointer;
        }
        #category-select { border-color: #81d4fa; } /* カテゴリは青枠 */

        /* 楽しいボタンデザイン */
        button {
            border-radius: 30px;
            border: none;
            cursor: pointer;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 0 #e65100; /* 立体的な影 */
            margin: 5px 10px;
        }
        button:not(:disabled):active { transform: translateY(3px); box-shadow: 0 2px 0 #e65100; }
        
        #btn-normal { background: var(--clear-color); box-shadow: 0 5px 0 #558b2f; }
        #btn-normal:not(:disabled):active { box-shadow: 0 2px 0 #558b2f; }
        #btn-advanced { background: #4fc3f7; box-shadow: 0 5px 0 #0277bd; }
        #btn-advanced:not(:disabled):active { box-shadow: 0 2px 0 #0277bd; }
        #btn-dictation { background: #ba68c8; box-shadow: 0 5px 0 #6a1b9a; }
        #btn-dictation:not(:disabled):active { box-shadow: 0 2px 0 #6a1b9a; }

        button:disabled { background: #cfd8dc; box-shadow: 0 5px 0 #b0bec5; color: #90a4ae; cursor: not-allowed; }

        /* ユーザー問題UI */
        .file-input-container { display: inline-flex; align-items: center; gap: 10px; position: relative; }
        .custom-file-btn {
            background: #90a4ae; color: white; padding: 10px 20px;
            border-radius: 30px; cursor: pointer; font-weight: bold;
            box-shadow: 0 5px 0 #546e7a;
        }
        .custom-file-btn:active { transform: translateY(2px); box-shadow: 0 3px 0 #546e7a; }
        #file-input { position: absolute; left: 0; top: 0; opacity: 0; width: 140px; cursor: pointer; }
        #file-display-name { font-size: 0.95rem; color: #555; font-weight: bold; }
        #restore-msg { font-size: 0.9rem; color: #0277bd; font-weight: bold; margin-top: 8px; min-height: 1.2rem; }

        /* チェックボックス */
        #voice-toggle { transform: scale(1.5); margin-right: 10px; cursor: pointer; }
        label:has(#voice-toggle) { font-weight: bold; color: #555; display: flex; align-items: center; justify-content: center;}

        /* --- タイピング画面 UI: 黒板風 --- */
        #screen-game {
            background-color: var(--chalkboard-bg);
            border-radius: 20px;
            padding: 30px;
            border: 10px solid #8d6e63; /* 木枠 */
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            color: var(--chalk-white);
        }

        .stats-bar {
            display: flex; justify-content: space-around;
            font-size: 1.2rem; font-weight: bold; margin-bottom: 15px;
            background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px;
        }
        .stats-bar span { color: #fff; }

        #progress-container { width: 100%; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; margin-bottom: 2rem; overflow: hidden; border: 2px solid #fff; }
        #progress-bar { height: 100%; background: var(--clear-color); width: 100%; transition: width 0.1s linear; }
        
        .japanese-text { font-size: 1.8rem; margin-bottom: 1.5rem; color: #ffd54f; height: 2rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        
        /* 英文表示エリア */
        .english-display {
            font-size: 2.3rem; display: flex; flex-wrap: wrap;
            justify-content: center; align-items: center;
            gap: 3px; margin-bottom: 2rem; min-height: 4rem;
            line-height: 1.2;
            font-family: 'Consolas', 'Courier New', monospace; /* 等幅フォント */
        }

        /* 入力対象の枠: チョーク書き風 */
        .char-box {
            width: 38px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            position: relative; margin: 0 2px;
            border: 2px dashed rgba(255,255,255,0.5); /* 点線 */
            border-radius: 5px; flex-shrink: 0;
            color: var(--chalk-white);
        }
        
        /* 単語間のスペース */
        .char-space { width: 20px; height: 55px; display: inline-block; flex-shrink: 0; }
        /* 記号 */
        .char-normal { display: flex; align-items: center; justify-content: center; height: 55px; width: auto; padding: 0 1px; color: rgba(255,255,255,0.8); }

        .char-box.correct { color: #fff; border: 2px solid #fff; background: rgba(255,255,255,0.1); text-shadow: 0 0 5px #fff; }
        .char-box.hint { color: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.2); }
        .char-box.error-anim { animation: shake 0.2s; border-color: var(--error-color); background-color: rgba(239, 83, 80, 0.2); }
        .char-box.error-mark::after { content: '×'; color: var(--error-color); position: absolute; font-size: 1.5rem; top: -15px; font-weight: bold; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 🎉 Perfect用アニメーション */
        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100px) rotate(360deg); opacity: 0; }
        }
        .perfect-confetti {
            position: absolute; font-size: 1.5rem;
            animation: confetti 1s ease-out forwards;
            pointer-events: none;
        }

        /* --- 仮想キーボード UI: ポップ --- */
        .keyboard { display: grid; grid-template-rows: repeat(3, 1fr); gap: 8px; margin-top: 2rem; user-select: none; background: #f0f4f8; padding: 15px; border-radius: 15px;}
        .key-row { display: flex; justify-content: center; gap: 8px; }
        .key {
            width: 48px; height: 48px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.2rem;
            border: none; background: white;
            color: var(--text-main);
            box-shadow: 0 4px 0 var(--key-shadow); /* 立体感 */
            transition: all 0.1s;
        }
        /* ターゲットキーの強調 */
        .key.active-target {
            background-color: var(--primary-color) !important;
            color: white !important;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #e65100 !important;
        }

        /* 指の色分け（パステル） */
        .p-l { background-color: var(--pinky); } .r-l { background-color: var(--ring); }
        .m-l { background-color: var(--middle); } .i-l { background-color: var(--index); }
        .i-r { background-color: var(--index); } .m-r { background-color: var(--middle); }
        .r-r { background-color: var(--ring); } .p-r { background-color: var(--pinky); }

        .instruction { font-size: 0.95rem; color: #546e7a; margin-top: 1.5rem; font-weight: bold;}
        #screen-game .instruction { color: rgba(255,255,255,0.7); }

        /* --- リザルト画面 UI --- */
        #screen-result h1 { font-size: 3.5rem; margin-bottom: 1rem; }
        #result-title.perfect { color: var(--perfect-color); text-shadow: 2px 2px 0 #c8e6c9; }
        #result-title.clear { color: var(--primary-color); text-shadow: 2px 2px 0 #ffe0b2; }
        .result-stats { background: #f1f8e9; padding: 20px; border-radius: 15px; display: inline-block; margin: 20px 0; border: 2px solid #dcedc8;}
        .result-stats p { font-size: 1.6rem; font-weight: bold; margin: 10px 0; color: #33691e; }
        #final-score { color: var(--primary-color); font-size: 2rem; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-top">
        <h1>English Typing Master 🎉</h1>
        
        <div class="menu-section">
            <div class="row source-selector">
                <label><input type="radio" name="csv-source" value="server" checked><span>標準問題</span></label>
                <label><input type="radio" name="csv-source" value="local"><span>ユーザー問題</span></label>
            </div>

            <div class="row">
                <div id="server-file-ui">
                    <select id="standard-file-select">
                        <option value="">-- 問題集をロード中 --</option>
                    </select>
                </div>
                <div id="local-file-ui" class="hidden">
                    <div class="file-input-container">
                        <span class="custom-file-btn">ファイルを選択</span>
                        <input type="file" id="file-input" accept=".csv">
                        <span id="file-display-name"></span>
                    </div>
                </div>
            </div>

            <div id="restore-msg"></div>
        </div>

        <div class="menu-section chalk-style">
            <div class="row">
                <select id="category-select" disabled>
                    <option value="">-- 問題を選択 --</option>
                </select>
            </div>
            <div class="row">
                <label><input type="checkbox" id="voice-toggle"> 音声再生あり</label>
            </div>
            <div class="row">
                <button id="btn-normal" class="mode-btn" disabled>Normal</button>
                <button id="btn-advanced" class="mode-btn" disabled>Advanced</button>
                <button id="btn-dictation" class="mode-btn" disabled>Dictation</button>
            </div>
        </div>
        <p class="instruction">※大文字・小文字はどちらでもOKだよ！</p>
    </div>

    <div id="screen-game" class="hidden">
        <div class="stats-bar">
            <div>Score: <span id="display-score">0</span></div>
            <div>Combo: <span id="display-combo">0</span></div>
            <div>Time: <span id="display-timer">0</span>s</div>
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="display-japanese" class="japanese-text"></div>
        <div id="display-english" class="english-display"></div>
        <div id="virtual-keyboard" class="keyboard"></div>
        <p class="instruction">Spaceキーでもう一度音声をきけるよ</p>
    </div>

    <div id="screen-result" class="hidden">
        <h1 id="result-title">Clear!</h1>
        <div class="result-stats">
            <p>スコア: <span id="final-score">0</span></p>
            <p>最大コンボ: <span id="final-combo">0</span></p>
        </div>
        <p class="instruction">Spaceキーを押してメニューにもどろう</p>
    </div>
</div>

<script>
// --- ロジックはバージョン1を完全継承 ---
const STD_LIST_PATH = "./standard_files.csv";
const CONFIG = { TIME_PER_CHAR: 3, BASE_SCORE: 5, COMBO_BONUS: 1, SPEECH_RATE: 0.9, MAX_MISS: 3 };

let state = {
    allData: [], selectedCategory: "", currentQuestions: [], currentQIdx: 0,
    currentMode: "", score: 0, combo: 0, maxCombo: 0, timer: 0, timerMax: 0,
    timerId: null, isSpeaking: false, inputIdx: 0, missInCurrent: 0, 
    gamePerfect: true 
};

const fingerMap = {
    'Q':'p-l','A':'p-l','Z':'p-l','W':'r-l','S':'r-l','X':'r-l','E':'m-l','D':'m-l','C':'m-l',
    'R':'i-l','F':'i-l','V':'i-l','T':'i-l','G':'i-l','B':'i-l','Y':'i-r','H':'i-r','N':'i-r',
    'U':'i-r','J':'i-r','M':'i-r','I':'m-r','K':'m-r','O':'r-r','L':'r-r','P':'p-r'
};
const rows = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["Z","X","C","V","B","N","M"]];

const el = {
    fileInput: document.getElementById('file-input'),
    fileNameDisp: document.getElementById('file-display-name'),
    restoreMsg: document.getElementById('restore-msg'),
    catSelect: document.getElementById('category-select'),
    stdFileSelect: document.getElementById('standard-file-select'),
    voiceToggle: document.getElementById('voice-toggle'),
    radioSources: document.querySelectorAll('input[name="csv-source"]'),
    localUi: document.getElementById('local-file-ui'),
    serverUi: document.getElementById('server-file-ui'),
    screens: { top: document.getElementById('screen-top'), game: document.getElementById('screen-game'), result: document.getElementById('screen-result') },
    displayScore: document.getElementById('display-score'), displayCombo: document.getElementById('display-combo'),
    displayTimer: document.getElementById('display-timer'), progressBar: document.getElementById('progress-bar'),
    japText: document.getElementById('display-japanese'), engDisplay: document.getElementById('display-english'),
    resultTitle: document.getElementById('result-title'), keyboard: document.getElementById('virtual-keyboard')
};

async function init() {
    renderKeyboard();
    await loadStandardFileList();
    restoreState();
}

async function loadStandardFileList() {
    try {
        const response = await fetch(STD_LIST_PATH);
        if (!response.ok) throw new Error();
        const text = await response.text();
        const files = text.split(/\r?\n/).filter(l => l.trim() !== "");
        el.stdFileSelect.innerHTML = '<option value="">-- 問題集を選択 --</option>';
        files.forEach(file => {
            const opt = document.createElement('option');
            opt.value = file.trim();
            opt.textContent = file.trim().replace(/\.csv$/i, '');
            el.stdFileSelect.appendChild(opt);
        });
    } catch (err) {
        el.stdFileSelect.innerHTML = '<option value="">-- 読込失敗 --</option>';
    }
}

function restoreState() {
    const d = sessionStorage.getItem('typing_csv_data');
    const v = sessionStorage.getItem('typing_voice');
    const c = sessionStorage.getItem('typing_cat');
    const s = sessionStorage.getItem('typing_source');
    const sf = sessionStorage.getItem('typing_std_file');

    if (d) { 
        state.allData = JSON.parse(d); 
        if (s === 'server') {
            document.querySelector('input[value="server"]').checked = true;
            el.serverUi.classList.remove('hidden'); el.localUi.classList.add('hidden');
            if(sf) el.stdFileSelect.value = sf;
        } else {
            document.querySelector('input[value="local"]').checked = true;
            el.serverUi.classList.add('hidden'); el.localUi.classList.remove('hidden');
            el.restoreMsg.textContent = "前回の問題ファイルを選択済みだよ";
        }
        updateCategoryList(); 
        if(c) { el.catSelect.value = c; state.selectedCategory = c; }
    }
    if (v !== null) el.voiceToggle.checked = (v === 'true');
    updateModeButtons();
}

el.radioSources.forEach(r => r.addEventListener('change', (e) => {
    el.restoreMsg.textContent = "";
    el.fileNameDisp.textContent = "";
    
    // 【仕様変更】手動切り替え時はデータをクリアする
    state.allData = [];
    state.selectedCategory = "";
    sessionStorage.removeItem('typing_csv_data');
    sessionStorage.removeItem('typing_cat');
    sessionStorage.removeItem('typing_source');
    sessionStorage.removeItem('typing_std_file');

    if (e.target.value === 'server') {
        el.serverUi.classList.remove('hidden');
        el.localUi.classList.add('hidden');
        el.stdFileSelect.value = ""; 
    } else {
        el.serverUi.classList.add('hidden');
        el.localUi.classList.remove('hidden');
        el.fileInput.value = ""; 
    }
    updateCategoryList();
}));

el.stdFileSelect.addEventListener('change', async () => {
    const file = el.stdFileSelect.value;
    if (!file) return;
    try {
        const response = await fetch("./" + file);
        if (!response.ok) throw new Error();
        const text = await response.text();
        parseCSV(text);
        sessionStorage.setItem('typing_csv_data', JSON.stringify(state.allData));
        sessionStorage.setItem('typing_source', 'server');
        sessionStorage.setItem('typing_std_file', file);
        updateCategoryList();
    } catch (err) { alert("読込失敗しちゃった"); }
});

el.fileInput.addEventListener('change', (e) => {
    const files = e.target.files[0];
    if (!files || files.length === 0) return;
    const file = files;
    el.fileNameDisp.textContent = file.name;
    el.restoreMsg.textContent = ""; 
    
    const reader = new FileReader();
    reader.onload = (ev) => {
        parseCSV(ev.target.result);
        sessionStorage.setItem('typing_csv_data', JSON.stringify(state.allData));
        sessionStorage.setItem('typing_source', 'local');
        updateCategoryList();
    };
    reader.readAsText(file);
});

function parseCSV(text) {
    state.allData = text.split(/\r?\n/).filter(l => l.includes(',')).map((line, i) => {
        if (i === 0) line = line.replace(/^\ufeff/, "");
        const c1 = line.indexOf(','), c2 = line.indexOf(',', c1 + 1);
        if(c1 === -1 || c2 === -1) return null;
        return { cat: line.substring(0, c1).trim(), jap: line.substring(c1 + 1, c2).trim(), eng: line.substring(c2 + 1).trim() };
    }).filter(d => d && d.cat.toLowerCase() !== "section");
}

function updateCategoryList() {
    const cats = [...new Set(state.allData.map(d => d.cat))];
    if (cats.length > 0) {
        el.catSelect.innerHTML = '<option value="">-- 問題を選択 --</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
        el.catSelect.disabled = false;
    } else {
        el.catSelect.innerHTML = '<option value="">-- 問題を選択 --</option>';
        el.catSelect.disabled = true;
        state.selectedCategory = "";
    }
    updateModeButtons();
}

function updateModeButtons() {
    const hasCat = !!state.selectedCategory;
    document.querySelectorAll('.mode-btn').forEach(b => {
        if(b.id === 'btn-dictation') b.disabled = !(hasCat && el.voiceToggle.checked);
        else b.disabled = !hasCat;
    });
}

el.catSelect.addEventListener('change', () => {
    state.selectedCategory = el.catSelect.value;
    updateModeButtons();
    sessionStorage.setItem('typing_cat', state.selectedCategory);
});

el.voiceToggle.addEventListener('change', () => {
    updateModeButtons();
    sessionStorage.setItem('typing_voice', el.voiceToggle.checked);
});

// --- ゲームエンジン ---

document.querySelectorAll('.mode-btn').forEach(btn => btn.onclick = () => {
    state.currentMode = btn.id.replace('btn-', '');
    state.currentQuestions = state.allData.filter(d => d.cat === state.selectedCategory);
    state.score = 0; state.combo = 0; state.maxCombo = 0; state.currentQIdx = 0;
    state.gamePerfect = true; 
    showScreen('game'); nextQuestion();
});

function nextQuestion() {
    if (state.currentQIdx >= state.currentQuestions.length) return endGame();
    const q = state.currentQuestions[state.currentQIdx];
    state.inputIdx = 0; state.missInCurrent = 0;
    el.displayScore.textContent = state.score; el.displayCombo.textContent = state.combo;
    el.japText.textContent = (state.currentMode === 'dictation') ? "???" : q.jap;
    el.engDisplay.innerHTML = '';
    
    let targetCount = 0, inBracket = false;
    for (let char of q.eng) {
        if (char === '[') { inBracket = true; continue; }
        if (char === ']') { inBracket = false; continue; }
        const span = document.createElement('span');
        if (/[a-zA-Z]/.test(char) && !inBracket) {
            span.className = 'char-box';
            span.dataset.char = char.toLowerCase();
            span.dataset.display = char;
            span.dataset.miss = 0;
            if (state.currentMode === 'normal') { span.textContent = char; span.classList.add('hint'); }
            targetCount++;
        } else if (char === ' ') {
            span.className = 'char-space'; span.innerHTML = '&nbsp;';
        } else {
            span.className = 'char-normal'; span.textContent = char;
        }
        el.engDisplay.appendChild(span);
    }
    state.timerMax = Math.max(targetCount * CONFIG.TIME_PER_CHAR, 5);
    state.timer = state.timerMax;
    if (el.voiceToggle.checked) speak(q.eng.replace(/\[|\]/g, ''));
    startTimer(); updateKeyboardHighlight();
}

function startTimer() {
    if (state.timerId) clearInterval(state.timerId);
    state.timerId = setInterval(() => {
        state.timer -= 0.1;
        el.displayTimer.textContent = Math.ceil(state.timer);
        el.progressBar.style.width = (state.timer / state.timerMax * 100) + "%";
        if (state.timer <= 0) { state.timer = 0; state.gamePerfect = false; state.combo = 0; clearInterval(state.timerId); nextStep(); }
    }, 100);
}

window.addEventListener('keydown', (e) => {
    if (!el.screens.game.classList.contains('hidden')) {
        if (e.code === 'Space') { 
            if (el.voiceToggle.checked) speak(state.currentQuestions[state.currentQIdx].eng.replace(/\[|\]/g, ''));
            e.preventDefault(); return; 
        }
        const targets = el.engDisplay.querySelectorAll('.char-box');
        if (state.inputIdx >= targets.length || e.key.length !== 1) return;
        const box = targets[state.inputIdx];
        if (e.key.toLowerCase() === box.dataset.char) {
            box.classList.remove('hint', 'error-mark'); box.classList.add('correct');
            box.textContent = box.dataset.display; state.inputIdx++;
            if (state.inputIdx >= targets.length) { 
                clearInterval(state.timerId);
                state.score += Math.ceil(state.timer) * (CONFIG.BASE_SCORE + state.combo);
                if (state.missInCurrent === 0) {
                    state.combo++; state.maxCombo = Math.max(state.combo, state.maxCombo);
                    createConfetti(box); // 🎉演出
                }
                else { state.combo = 0; state.gamePerfect = false; }
                nextStep(); 
            } else { updateKeyboardHighlight(); }
        } else if (/[a-zA-Z]/.test(e.key)) {
            state.combo = 0; state.missInCurrent++; el.displayCombo.textContent = 0;
            box.classList.add('error-anim', 'error-mark');
            let m = parseInt(box.dataset.miss || 0) + 1; box.dataset.miss = m;
            setTimeout(() => box.classList.remove('error-anim'), 200);
            if (m >= CONFIG.MAX_MISS) { box.textContent = box.dataset.display; box.classList.add('hint'); }
        }
    } else if (!el.screens.result.classList.contains('hidden') && e.code === 'Space') showScreen('top');
});

// 🎉 パーフェクト演出用の紙吹雪
function createConfetti(el) {
    const emojis = ['🎉', '✨', '👍', '🌟'];
    for (let i = 0; i < 4; i++) {
        const confetti = document.createElement('span');
        confetti.className = 'perfect-confetti';
        confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        confetti.style.left = (Math.random() * 20 - 10) + 'px';
        confetti.style.top = (Math.random() * 20 - 10) + 'px';
        el.appendChild(confetti);
        setTimeout(() => confetti.remove(), 1000);
    }
}

function nextStep() { setTimeout(() => { state.currentQIdx++; nextQuestion(); }, 600); }
function showScreen(id) { Object.keys(el.screens).forEach(k => el.screens[k].classList.toggle('hidden', k !== id)); }
function endGame() {
    showScreen('result');
    el.resultTitle.className = state.gamePerfect ? "perfect" : "clear";
    el.resultTitle.textContent = state.gamePerfect ? "Perfect! 🎉" : "Clear! 👍";
    document.getElementById('final-score').textContent = state.score;
    document.getElementById('final-combo').textContent = state.maxCombo;
}
function renderKeyboard() { el.keyboard.innerHTML = rows.map(r => `<div class="key-row">${r.map(k => `<div class="key ${fingerMap[k]}" id="key-${k.toLowerCase()}">${k}</div>`).join('')}</div>`).join(''); }
function updateKeyboardHighlight() {
    document.querySelectorAll('.key').forEach(k => k.classList.remove('active-target'));
    if (state.currentMode === 'advanced' || state.currentMode === 'dictation') return el.keyboard.classList.add('hidden');
    el.keyboard.classList.remove('hidden');
    const target = el.engDisplay.querySelectorAll('.char-box')[state.inputIdx];
    if (target) document.getElementById(`key-${target.dataset.char}`)?.classList.add('active-target');
}
function speak(t) { if (!state.isSpeaking) { const u = new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=CONFIG.SPEECH_RATE; u.onstart=()=>state.isSpeaking=true; u.onend=()=>state.isSpeaking=false; speechSynthesis.speak(u); } }

window.onload = init;
</script>
</body>
