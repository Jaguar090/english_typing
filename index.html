<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Typing Master</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --primary-color: #4a90e2;
            --perfect-color: #4a90e2; /* 青 */
            --clear-color: #2ecc71;   /* 黄緑 */
            --error-color: #e74c3c;
            --text-main: #333;
            --text-light: #aaa;
            --pinky: #ffebf2; --ring: #fff3e0; --middle: #e8f5e9; --index: #e3f2fd;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        #app {
            width: 95%; max-width: 950px;
            background: var(--card-bg); padding: 2rem;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .hidden { display: none !important; }

        /* トップ画面 */
        .menu-group { margin-bottom: 1.5rem; }
        #category-select { width: 350px; max-width: 100%; padding: 10px; font-size: 1rem; }
        select, button, input[type="file"] { padding: 10px 20px; font-size: 1rem; border-radius: 5px; border: 1px solid #ccc; margin: 5px; }
        button { background: var(--primary-color); color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        /* タイピング画面 */
        .stats-bar { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }
        #progress-container { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 2rem; overflow: hidden; }
        #progress-bar { height: 100%; background: var(--primary-color); width: 100%; transition: width 0.1s linear; }
        
        .japanese-text { font-size: 1.5rem; margin-bottom: 1rem; color: #555; height: 1.8rem; }
        
        /* 英文表示エリア */
        .english-display {
            font-size: 2rem; display: flex; flex-wrap: wrap;
            justify-content: center; align-items: center;
            gap: 2px; margin-bottom: 2rem; min-height: 3.5rem;
            line-height: 1.2;
        }

        /* 入力対象の枠 */
        .char-box {
            width: 35px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            position: relative; margin: 0 1px;
            border: 2px solid #ddd; border-radius: 5px;
            flex-shrink: 0;
        }
        
        /* 単語間のスペース（枠と同じ幅を確保） */
        .char-space {
            width: 35px; height: 50px;
            display: inline-block;
            flex-shrink: 0;
        }

        /* 入力対象外（記号・[]内文字） */
        .char-normal {
            display: flex; align-items: center; justify-content: center;
            height: 50px; width: auto;
            padding: 0 1px; font-weight: normal;
        }

        .char-box.correct { color: black; border-color: #eee; }
        .char-box.hint { color: var(--text-light); }
        .char-box.error-anim { animation: shake 0.2s; border-color: var(--error-color); }
        .char-box.error-mark::after { content: '×'; color: var(--error-color); position: absolute; font-size: 1.2rem; top: -10px; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* リザルト画面 */
        #result-title.perfect { color: var(--perfect-color); }
        #result-title.clear { color: var(--clear-color); }

        /* 仮想キーボード */
        .keyboard { display: grid; grid-template-rows: repeat(3, 1fr); gap: 5px; margin-top: 2rem; user-select: none; }
        .key-row { display: flex; justify-content: center; gap: 5px; }
        .key { width: 45px; height: 45px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 1px solid #ddd; background: white; }
        .key.active-target { border: 3px solid #333; transform: translateY(-2px); box-shadow: 0 4px 0 #999; }

        .p-l { background-color: var(--pinky); } .r-l { background-color: var(--ring); }
        .m-l { background-color: var(--middle); } .i-l { background-color: var(--index); }
        .i-r { background-color: var(--index); } .m-r { background-color: var(--middle); }
        .r-r { background-color: var(--ring); } .p-r { background-color: var(--pinky); }

        .instruction { font-size: 0.9rem; color: #777; margin-top: 1rem; }
    </style>
</head>
<body>

<div id="app">
    <div id="screen-top">
        <h1>English Typing Master</h1>
        <div class="menu-group"><input type="file" id="file-input" accept=".csv"></div>
        <div class="menu-group">
            <select id="category-select" disabled><option value="">-- ファイルを選択してください --</option></select>
        </div>
        <div class="menu-group"><label><input type="checkbox" id="voice-toggle"> 音声再生あり</label></div>
        <div class="menu-group">
            <button id="btn-normal" class="mode-btn" disabled>Normal Mode</button>
            <button id="btn-advanced" class="mode-btn" disabled>Advanced Mode</button>
            <button id="btn-dictation" class="mode-btn" disabled>Dictation Mode</button>
        </div>
    </div>

    <div id="screen-game" class="hidden">
        <div class="stats-bar">
            <div>Score: <span id="display-score">0</span></div>
            <div>Combo: <span id="display-combo">0</span></div>
            <div>Time: <span id="display-timer">0</span>s</div>
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="display-japanese" class="japanese-text"></div>
        <div id="display-english" class="english-display"></div>
        <div id="virtual-keyboard" class="keyboard"></div>
        <p class="instruction">Spaceキーで音声を再再生</p>
    </div>

    <div id="screen-result" class="hidden">
        <h1 id="result-title">Clear!</h1>
        <div style="font-size: 1.5rem; margin: 2rem 0;">
            <p>スコア: <span id="final-score">0</span></p>
            <p>最大コンボ: <span id="final-combo">0</span></p>
        </div>
        <p class="instruction">Spaceキーでメニューに戻る</p>
    </div>
</div>

<script>
const CONFIG = { TIME_PER_CHAR: 3, BASE_SCORE: 5, COMBO_BONUS: 1, SPEECH_RATE: 0.9, MAX_MISS: 3 };

let state = {
    allData: [], selectedCategory: "", currentQuestions: [], currentQIdx: 0,
    currentMode: "", score: 0, combo: 0, maxCombo: 0, timer: 0, timerMax: 0,
    timerId: null, isSpeaking: false, inputIdx: 0, missInCurrent: 0, 
    gamePerfect: true 
};

const fingerMap = {
    'Q':'p-l','A':'p-l','Z':'p-l','W':'r-l','S':'r-l','X':'r-l','E':'m-l','D':'m-l','C':'m-l',
    'R':'i-l','F':'i-l','V':'i-l','T':'i-l','G':'i-l','B':'i-l','Y':'i-r','H':'i-r','N':'i-r',
    'U':'i-r','J':'i-r','M':'i-r','I':'m-r','K':'m-r','O':'r-r','L':'r-r','P':'p-r'
};

const rows = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["Z","X","C","V","B","N","M"]];

const el = {
    fileInput: document.getElementById('file-input'),
    catSelect: document.getElementById('category-select'),
    screens: { top: document.getElementById('screen-top'), game: document.getElementById('screen-game'), result: document.getElementById('screen-result') },
    displayScore: document.getElementById('display-score'), displayCombo: document.getElementById('display-combo'),
    displayTimer: document.getElementById('display-timer'), progressBar: document.getElementById('progress-bar'),
    japText: document.getElementById('display-japanese'), engDisplay: document.getElementById('display-english'),
    resultTitle: document.getElementById('result-title'),
    keyboard: document.getElementById('virtual-keyboard'), voiceToggle: document.getElementById('voice-toggle')
};

el.fileInput.addEventListener('change', (e) => {
    const files = e.target.files[0];
    if (!files || files.length === 0) return;
    const file = files;
    const reader = new FileReader();
    reader.onload = (ev) => {
        parseCSV(ev.target.result);
        sessionStorage.setItem('typing_csv_data', JSON.stringify(state.allData));
        updateCategoryList();
    };
    reader.readAsText(file);
});

function parseCSV(text) {
    state.allData = text.split(/\r?\n/).filter(l => l.includes(',')).map((line, i) => {
        if (i === 0) line = line.replace(/^\ufeff/, "");
        const c1 = line.indexOf(','), c2 = line.indexOf(',', c1 + 1);
        return { cat: line.substring(0, c1).trim(), jap: line.substring(c1 + 1, c2).trim(), eng: line.substring(c2 + 1).trim() };
    }).filter(d => d.cat.toLowerCase() !== "section");
}

function updateCategoryList() {
    const cats = [...new Set(state.allData.map(d => d.cat))];
    el.catSelect.innerHTML = '<option value="">-- 分類を選択 --</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
    el.catSelect.disabled = false;
}

el.catSelect.addEventListener('change', () => {
    state.selectedCategory = el.catSelect.value;
    const hasCat = !!state.selectedCategory;
    document.querySelectorAll('.mode-btn').forEach(b => {
        if(b.id === 'btn-dictation') b.disabled = !(hasCat && el.voiceToggle.checked);
        else b.disabled = !hasCat;
    });
    sessionStorage.setItem('typing_cat', state.selectedCategory);
});

document.querySelectorAll('.mode-btn').forEach(btn => btn.onclick = () => {
    state.currentMode = btn.id.replace('btn-', '');
    state.currentQuestions = state.allData.filter(d => d.cat === state.selectedCategory);
    state.score = 0; state.combo = 0; state.maxCombo = 0; state.currentQIdx = 0;
    state.gamePerfect = true; 
    showScreen('game'); nextQuestion();
});

function nextQuestion() {
    if (state.currentQIdx >= state.currentQuestions.length) return endGame();
    const q = state.currentQuestions[state.currentQIdx];
    state.inputIdx = 0; state.missInCurrent = 0;
    el.displayScore.textContent = state.score; el.displayCombo.textContent = state.combo;
    el.japText.textContent = (state.currentMode === 'dictation') ? "???" : q.jap;
    
    el.engDisplay.innerHTML = '';
    let targetCount = 0, inBracket = false;
    for (let char of q.eng) {
        if (char === '[') { inBracket = true; continue; }
        if (char === ']') { inBracket = false; continue; }
        
        const span = document.createElement('span');
        if (/[a-zA-Z]/.test(char) && !inBracket) {
            span.className = 'char-box';
            span.dataset.char = char.toLowerCase();
            span.dataset.display = char;
            span.dataset.miss = 0;
            if (state.currentMode === 'normal') { span.textContent = char; span.classList.add('hint'); }
            targetCount++;
        } else if (char === ' ') {
            // スペースは入力枠と同じ幅の透明ボックスにする
            span.className = 'char-space';
            span.innerHTML = '&nbsp;';
        } else {
            span.className = 'char-normal';
            span.textContent = char;
        }
        el.engDisplay.appendChild(span);
    }
    state.timerMax = Math.max(targetCount * CONFIG.TIME_PER_CHAR, 5);
    state.timer = state.timerMax;
    if (el.voiceToggle.checked) speak(q.eng.replace(/\[|\]/g, ''));
    startTimer(); updateKeyboardHighlight();
}

function startTimer() {
    if (state.timerId) clearInterval(state.timerId);
    state.timerId = setInterval(() => {
        state.timer -= 0.1;
        el.displayTimer.textContent = Math.ceil(state.timer);
        el.progressBar.style.width = (state.timer / state.timerMax * 100) + "%";
        if (state.timer <= 0) { 
            state.timer = 0; state.gamePerfect = false; state.combo = 0;
            clearInterval(state.timerId); nextStep(); 
        }
    }, 100);
}

window.addEventListener('keydown', (e) => {
    if (!el.screens.game.classList.contains('hidden')) {
        if (e.code === 'Space') { 
            if (el.voiceToggle.checked) speak(state.currentQuestions[state.currentQIdx].eng.replace(/\[|\]/g, ''));
            e.preventDefault(); return; 
        }
        const targets = el.engDisplay.querySelectorAll('.char-box');
        if (state.inputIdx >= targets.length || e.key.length !== 1) return;
        
        const box = targets[state.inputIdx];
        if (e.key.toLowerCase() === box.dataset.char) {
            box.classList.remove('hint', 'error-mark'); box.classList.add('correct');
            box.textContent = box.dataset.display; state.inputIdx++;
            if (state.inputIdx >= targets.length) { 
                clearInterval(state.timerId);
                state.score += Math.ceil(state.timer) * (CONFIG.BASE_SCORE + state.combo);
                if (state.missInCurrent === 0) { state.combo++; state.maxCombo = Math.max(state.combo, state.maxCombo); }
                else { state.combo = 0; state.gamePerfect = false; }
                nextStep(); 
            } else { updateKeyboardHighlight(); }
        } else if (/[a-zA-Z]/.test(e.key)) {
            state.combo = 0; state.missInCurrent++;
            el.displayCombo.textContent = 0;
            box.classList.add('error-anim', 'error-mark');
            let m = parseInt(box.dataset.miss) + 1; box.dataset.miss = m;
            setTimeout(() => box.classList.remove('error-anim'), 200);
            if (m >= CONFIG.MAX_MISS) { box.textContent = box.dataset.display; box.classList.add('hint'); }
        }
    } else if (!el.screens.result.classList.contains('hidden') && e.code === 'Space') showScreen('top');
});

function nextStep() { setTimeout(() => { state.currentQIdx++; nextQuestion(); }, 600); }
function showScreen(id) { Object.keys(el.screens).forEach(k => el.screens[k].classList.toggle('hidden', k !== id)); }

function endGame() {
    showScreen('result');
    el.resultTitle.className = state.gamePerfect ? "perfect" : "clear";
    el.resultTitle.textContent = state.gamePerfect ? "Perfect!" : "Clear!";
    document.getElementById('final-score').textContent = state.score;
    document.getElementById('final-combo').textContent = state.maxCombo;
}

function renderKeyboard() { el.keyboard.innerHTML = rows.map(r => `<div class="key-row">${r.map(k => `<div class="key ${fingerMap[k]}" id="key-${k.toLowerCase()}">${k}</div>`).join('')}</div>`).join(''); }

function updateKeyboardHighlight() {
    document.querySelectorAll('.key').forEach(k => k.classList.remove('active-target'));
    if (state.currentMode === 'advanced' || state.currentMode === 'dictation') return el.keyboard.classList.add('hidden');
    el.keyboard.classList.remove('hidden');
    const target = el.engDisplay.querySelectorAll('.char-box')[state.inputIdx];
    if (target) document.getElementById(`key-${target.dataset.char}`)?.classList.add('active-target');
}

function speak(t) { if (!state.isSpeaking) { const u = new SpeechSynthesisUtterance(t); u.lang='en-US'; u.rate=CONFIG.SPEECH_RATE; u.onstart=()=>state.isSpeaking=true; u.onend=()=>state.isSpeaking=false; speechSynthesis.speak(u); } }

window.onload = () => {
    renderKeyboard();
    const d = sessionStorage.getItem('typing_csv_data');
    if (d) { 
        state.allData = JSON.parse(d); updateCategoryList(); 
        const c = sessionStorage.getItem('typing_cat'); if(c) el.catSelect.value = c;
    }
    el.voiceToggle.checked = sessionStorage.getItem('typing_voice') === 'true';
};
</script>
</body>
</html>
